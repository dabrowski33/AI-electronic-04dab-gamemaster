spring:
  application:
    name: java-simulator

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:genrl_gamemaster}
    username: ${POSTGRES_USER:genrl}
    password: ${POSTGRES_PASSWORD:genrl_secure_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${JAVA_SIMULATOR_PORT:8080}
  servlet:
    context-path: /api/simulator

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.genrl.gamemaster: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# LangChain4j Configuration
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      model-name: gpt-4o
      temperature: 0.1
      max-tokens: 4000
      timeout: 60s
      log-requests: true
      log-responses: true

# Simulator Configuration
simulator:
  timeout-seconds: 60
  max-memory-mb: 512
  max-cpu-cores: 1.0
  headless: true
  frame-skip: 4
  observation-type: PIXELS # or FEATURES

# Game-specific configurations
games:
  super-mario:
    rom-path: /roms/super_mario_world.smc
    emulator: RETROARCH
    core: snes9x
    action-space: 12
    observation-shape: [84, 84, 4]
    reward-scale: 0.01

  pacman:
    rom-path: /roms/pacman.zip
    emulator: MAME
    action-space: 4
    observation-shape: [84, 84, 4]
    reward-scale: 1.0